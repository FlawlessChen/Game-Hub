<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>打地鼠 | 游戏中心</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-page">
      <header class="game-header">
        <a class="hub-link" href="../../index.html#/">游戏中心</a>

        <div class="score-strip" aria-label="计分板">
          <div class="score-box">
            <span>得分</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span>最高</span>
            <strong id="best-score">0</strong>
          </div>
          <button id="restart" class="icon-button" type="button" aria-label="新游戏" title="新游戏">
            &#8635;
          </button>
        </div>
      </header>

      <section class="play-layout">
        <section class="board-section" aria-labelledby="game-title">
          <div class="title-row">
            <div>
              <h1 id="game-title">打地鼠</h1>
              <p id="status">准备开始</p>
            </div>
            <div class="time-badge">
              <span>时间</span>
              <strong id="time-left">30</strong>
            </div>
          </div>

          <div class="board-wrap">
            <section id="board" class="mole-board" aria-label="打地鼠棋盘"></section>

            <div id="overlay" class="overlay">
              <div class="overlay-panel">
                <h2 id="overlay-title">打地鼠</h2>
                <p id="overlay-text">准备开始</p>
                <button id="overlay-action" class="primary-button" type="button">开始</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="游戏状态">
          <div class="metric">
            <span>连击</span>
            <strong id="combo">0</strong>
          </div>

          <div class="metric">
            <span>漏击</span>
            <strong id="misses">0</strong>
          </div>

          <div class="metric">
            <span>关卡</span>
            <strong id="level">1</strong>
          </div>

          <button id="pause" class="secondary-button" type="button">暂停</button>
        </aside>
      </section>
    </main>

    <script src="../../js/progress.js" defer></script>
    <script src="../../js/mobile-viewport.js" defer></script>
    <script src="./game.js" defer></script>
  </body>
</html>
