<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#102033" />
    <title>建楼大师 | 游戏中心</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="建楼大师游戏">
        <header class="game-header">
          <a class="hub-link" href="../../index.html#/">游戏中心</a>
          <div class="title-block">
            <h1>建楼大师</h1>
            <p id="gameStatus">第 1 层</p>
          </div>
          <div class="metrics" aria-live="polite">
            <div>
              <span>层数</span>
              <strong id="floorValue">0</strong>
            </div>
            <div>
              <span>最佳</span>
              <strong id="bestValue">0</strong>
            </div>
          </div>
          <button id="restartButton" type="button">重开</button>
        </header>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="430" height="720" aria-label="摆动吊楼和楼层堆叠"></canvas>

          <div id="gameOverPanel" class="game-over" hidden>
            <strong>游戏结束</strong>
            <span>总层数 <b id="finalScore">0</b></span>
            <button id="overlayRestartButton" type="button">重开</button>
          </div>
        </div>
      </section>
    </main>

    <script src="../../js/progress.js" defer></script>
    <script src="./game.js" defer></script>
  </body>
</html>
