<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <title>打砖块 | 游戏中心</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="打砖块游戏">
        <header class="game-header">
          <a class="hub-link" href="../../index.html#/">游戏中心</a>
          <div>
            <h1>打砖块</h1>
            <p id="gameStatus">点击画布或按空格键发球</p>
          </div>
          <button id="restartButton" type="button">重新开始</button>
        </header>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="800" height="600" aria-label="打砖块游戏画布"></canvas>

          <div id="overlay" class="overlay" hidden>
            <strong id="overlayTitle">游戏结束</strong>
            <span id="overlayMessage">得分 0</span>
            <button id="overlayButton" type="button">重新开始</button>
          </div>
        </div>
      </section>
    </main>

    <script src="../../js/progress.js" defer></script>
    <script src="../../js/mobile-viewport.js" defer></script>
    <script src="./game.js" defer></script>
  </body>
</html>
