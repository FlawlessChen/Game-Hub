<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>躲避小球 | 游戏中心</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="躲避小球游戏">
        <header class="game-header">
          <a class="hub-link" href="../../index.html#/">游戏中心</a>
          <div>
            <h1>躲避小球</h1>
            <p id="gameStatus">拖动蓝色小球，躲开红色危险球</p>
          </div>
          <button id="restartButton" type="button">重开</button>
        </header>

        <div class="score-row" aria-label="计分板">
          <span>得分 <b id="scoreValue">0</b></span>
          <span>护盾 <b id="shieldValue">3</b></span>
          <span>最佳 <b id="bestValue">0</b></span>
        </div>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="420" height="680" aria-label="躲避小球画布"></canvas>
          <div id="gameOverPanel" class="game-over" hidden>
            <strong>游戏结束</strong>
            <span id="finalScore">得分 0</span>
            <button id="overlayRestartButton" type="button">重新开始</button>
          </div>
        </div>
      </section>
    </main>

    <script src="../../js/progress.js" defer></script>
    <script src="./game.js" defer></script>
  </body>
</html>
