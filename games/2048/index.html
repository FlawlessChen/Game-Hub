<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>2048 | 游戏中心</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-page">
      <header class="game-header">
        <a class="hub-link" href="../../index.html#/">游戏中心</a>

        <div class="score-strip" aria-label="计分板">
          <div class="score-box">
            <span>得分</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span>最高</span>
            <strong id="best-score">0</strong>
          </div>
          <button id="new-game" class="icon-button" type="button" aria-label="新游戏" title="新游戏">
            &#8635;
          </button>
        </div>
      </header>

      <section class="play-layout">
        <section class="board-section" aria-labelledby="game-title">
          <div class="title-row">
            <div>
              <h1 id="game-title">2048</h1>
              <p>合并到 2048</p>
            </div>
            <div class="goal-badge">4 × 4</div>
          </div>

          <div class="board-wrap">
            <div id="board" class="board" tabindex="0" aria-label="2048 棋盘"></div>

            <div id="message" class="message is-hidden" role="dialog" aria-labelledby="message-title">
              <div class="message-panel">
                <h2 id="message-title">2048</h2>
                <p id="message-text">完成</p>
                <div class="message-actions">
                  <button id="keep-going" class="secondary-button" type="button">继续</button>
                  <button id="retry" class="primary-button" type="button">重开</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="游戏状态">
          <div class="metric">
            <span>步数</span>
            <strong id="moves">0</strong>
          </div>
          <div class="metric">
            <span>最大方块</span>
            <strong id="largest-tile">2</strong>
          </div>
          <div class="control-pad" aria-label="方向控制">
            <button type="button" data-direction="up" aria-label="向上" title="向上">&#8593;</button>
            <button type="button" data-direction="left" aria-label="向左" title="向左">&#8592;</button>
            <button type="button" data-direction="down" aria-label="向下" title="向下">&#8595;</button>
            <button type="button" data-direction="right" aria-label="向右" title="向右">&#8594;</button>
          </div>
        </aside>
      </section>
    </main>

    <script src="../../js/progress.js" defer></script>
    <script src="../../js/mobile-viewport.js" defer></script>
    <script src="./game.js" defer></script>
  </body>
</html>
