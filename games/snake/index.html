<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake | Game Hub</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-page">
      <header class="game-header">
        <a class="hub-link" href="../../index.html#/">Game Hub</a>

        <div class="score-strip" aria-label="计分板">
          <div class="score-box">
            <span>得分</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span>最高</span>
            <strong id="best-score">0</strong>
          </div>
          <button id="restart" class="icon-button" type="button" aria-label="新游戏" title="新游戏">
            &#8635;
          </button>
        </div>
      </header>

      <section class="play-layout">
        <section class="board-section" aria-labelledby="game-title">
          <div class="title-row">
            <div>
              <h1 id="game-title">Snake</h1>
              <p id="status">Ready</p>
            </div>
            <div class="speed-badge">
              <span>速度</span>
              <strong id="speed-label">Normal</strong>
            </div>
          </div>

          <div class="canvas-wrap">
            <canvas id="game" width="480" height="480" aria-label="贪吃蛇棋盘"></canvas>

            <div id="overlay" class="overlay">
              <div class="overlay-panel">
                <h2 id="overlay-title">Snake</h2>
                <p id="overlay-text">Ready</p>
                <button id="overlay-action" class="primary-button" type="button">开始</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="游戏控制">
          <div class="metric">
            <span>长度</span>
            <strong id="length">3</strong>
          </div>

          <div class="metric">
            <span>连吃</span>
            <strong id="streak">0</strong>
          </div>

          <div class="speed-control" aria-label="速度选择">
            <button type="button" data-speed="slow">Slow</button>
            <button type="button" data-speed="normal" class="is-active">Normal</button>
            <button type="button" data-speed="fast">Fast</button>
          </div>

          <div class="control-pad" aria-label="方向控制">
            <button type="button" data-direction="up" aria-label="向上" title="向上">&#8593;</button>
            <button type="button" data-direction="left" aria-label="向左" title="向左">&#8592;</button>
            <button type="button" data-direction="down" aria-label="向下" title="向下">&#8595;</button>
            <button type="button" data-direction="right" aria-label="向右" title="向右">&#8594;</button>
          </div>

          <button id="pause" class="secondary-button" type="button">暂停</button>
        </aside>
      </section>
    </main>

    <script src="./game.js" defer></script>
  </body>
</html>
